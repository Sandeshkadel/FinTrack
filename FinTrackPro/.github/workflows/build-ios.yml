name: Build iOS IPA

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: yarn

      - name: 🍎 Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: 📦 Install dependencies
        run: |
          cd FinTrackPro
          npm install --legacy-peer-deps
          cd ios && pod install

      - name: 🏗️ Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🔍 Run TypeScript type check
        run: |
          cd FinTrackPro
          npx tsc --noEmit
        continue-on-error: true

      - name: 📱 Build production IPA
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: yarn
          command: |
            cd FinTrackPro && eas build -p ios --profile production --local --output ./build/fintrack-pro.ipa

      - name: ⬆️ Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: fintrack-pro-ios-ipa
          path: FinTrackPro/build/fintrack-pro.ipa
          if-no-files-found: ignore

      - name: 📝 Comment on PR with download links
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ✅ iOS build succeeded!
            📦 [Download IPA](#)
            Built with Expo SDK 51 · React Native 0.74.5 · iOS 15.1+