name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 📦 Install
        run: |
          cd FinTrackPro
          npm install --legacy-peer-deps

      - name: 🏗️ Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📱 Build Android
        run: |
          cd FinTrackPro && eas build -p android --profile production --non-interactive

      - name: 🍎 Build iOS
        run: |
          cd FinTrackPro && eas build -p ios --profile production --non-interactive

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FinTrackPro/build/fintrack-pro.apk
            FinTrackPro/build/fintrack-pro.aab
            FinTrackPro/build/fintrack-pro.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}