name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 📦 Install
        run: |
          cd FinTrackPro
          npm install --legacy-peer-deps

      - name: 🏗️ Generate native Android project
        run: |
          cd FinTrackPro
          npx expo prebuild --platform android --clean --no-install

      - name: 📥 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 Make gradlew executable
        run: |
          cd FinTrackPro/android
          chmod +x ./gradlew

      - name: 📱 Build release APK
        run: |
          cd FinTrackPro/android
          ./gradlew assembleRelease
          mkdir -p ../build
          cp app/build/outputs/apk/release/app-release.apk ../build/fintrack-pro.apk

      - name: 📦 Build release AAB
        run: |
          cd FinTrackPro/android
          ./gradlew bundleRelease
          mkdir -p ../build
          cp app/build/outputs/bundle/release/app-release.aab ../build/fintrack-pro.aab

      - name: ⬆️ Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fintrack-pro-android
          path: |
            FinTrackPro/build/fintrack-pro.apk
            FinTrackPro/build/fintrack-pro.aab
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: fintrack-pro-android
          path: artifacts/

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          name: FinTrack Pro ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') || contains(inputs.tag, '-') }}
          generate_release_notes: true
          body: |
            ## 📲 FinTrack Pro v${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

            ### 📥 Downloads

            | Platform | File | Size |
            |----------|------|------|
            | 🤖 Android | `fintrack-pro.apk` | sideload-ready |
            | 🤖 Android | `fintrack-pro.aab` | Play Store upload |
            | 🍎 iOS | _build locally — see README iOS Install Guide_ | — |

            ### 📋 Install

            **Android:** Download `fintrack-pro.apk` → enable Install Unknown Apps → tap to install. Works on Android 7.0+.

            **iOS:** This release does **not** include a pre-built `.ipa` (Apple requires macOS + Xcode for that). Follow the [iOS Install Guide in the README](https://github.com/Sandeshkadel/FinTrack#-ios-install-guide-altstore--sideloadly) — you can build the IPA yourself with `eas build -p ios --local` on macOS, then sideload via **AltStore** or **Sideloadly** using a free Apple ID.

            ### ✨ What's in this build
            - Full offline-first finance app
            - 14 screens: Dashboard, Income, Expenses, Goals, Budgets, Calendar, Reports, Insights, Search, Settings, Profile
            - OCR receipt scanning, multi-image uploads, biometric lock
            - Light/dark theme, 8 currencies, charts, calendar gallery

            See the full [README](https://github.com/Sandeshkadel/FinTrack) for features, build instructions, and install guides.
          files: |
            artifacts/fintrack-pro.apk
            artifacts/fintrack-pro.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
