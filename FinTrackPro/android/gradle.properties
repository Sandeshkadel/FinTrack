# Project-wide Gradle settings for FinTrack Pro
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
android.enableJetifier=true
FLIPPER_VERSION=0.182.0
# Use only arches with prebuilt React Native libs to avoid NDK compile step
# (modern Android phones use arm64-v8a; x86/x86_64 are for emulators)
reactNativeArchitectures=arm64-v8a,x86,x86_64
newArchEnabled=false
hermesEnabled=true