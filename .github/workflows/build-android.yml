name: Build Android APK/AAB

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK + AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 📦 Install dependencies
        run: |
          cd FinTrackPro
          npm install --legacy-peer-deps

      - name: 🔍 Run TypeScript type check
        run: |
          cd FinTrackPro
          npx tsc --noEmit
        continue-on-error: true

      - name: 🏗️ Generate native Android project
        run: |
          cd FinTrackPro
          npx expo prebuild --platform android --clean --no-install

      - name: 📥 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔑 Make gradlew executable
        run: |
          cd FinTrackPro/android
          chmod +x ./gradlew

      - name: 📱 Build debug APK
        run: |
          cd FinTrackPro/android
          ./gradlew assembleDebug
          mkdir -p ../build
          cp app/build/outputs/apk/debug/app-debug.apk ../build/fintrack-pro.apk

      - name: 📦 Build release AAB
        run: |
          cd FinTrackPro/android
          ./gradlew bundleRelease
          mkdir -p ../build
          cp app/build/outputs/bundle/release/app-release.aab ../build/fintrack-pro.aab

      - name: ⬆️ Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fintrack-pro-android-apk
          path: FinTrackPro/build/fintrack-pro.apk
          if-no-files-found: warn

      - name: ⬆️ Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: fintrack-pro-android-aab
          path: FinTrackPro/build/fintrack-pro.aab
          if-no-files-found: warn