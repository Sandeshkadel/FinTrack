name: Build iOS IPA

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: 🍎 Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: 📦 Install dependencies
        run: |
          cd FinTrackPro
          npm install --legacy-peer-deps

      - name: 🏗️ Generate native iOS project
        run: |
          cd FinTrackPro
          npx expo prebuild --platform ios --clean --no-install

      - name: 🍫 Install CocoaPods
        run: |
          cd FinTrackPro/ios
          pod install

      - name: 🔍 Run TypeScript type check
        run: |
          cd FinTrackPro
          npx tsc --noEmit
        continue-on-error: true

      - name: 📱 Build iOS archive (generic, no signing)
        run: |
          cd FinTrackPro/ios
          xcodebuild \
            -workspace FinTrackPro.xcworkspace \
            -scheme FinTrackPro \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/FinTrackPro.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: 📦 Export IPA from archive
        run: |
          cd FinTrackPro/ios
          mkdir -p build/Payload
          mkdir -p ../build
          # Extract .app from archive and zip as IPA
          APP_PATH="build/FinTrackPro.xcarchive/Products/Applications/FinTrackPro.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App bundle not found at $APP_PATH"
            ls -la build/FinTrackPro.xcarchive/Products/ 2>/dev/null || echo "No Products dir"
            exit 1
          fi
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -r ../../build/fintrack-pro-unsigned.ipa Payload/
          cd ..

      - name: ⬆️ Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: fintrack-pro-ios-ipa
          path: FinTrackPro/build/fintrack-pro-unsigned.ipa
          if-no-files-found: warn
